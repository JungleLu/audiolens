name: Bug report / 缺陷报告
description: Report a problem to help us improve / 报告问题以帮助改进
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill in the fields below.
        感谢反馈缺陷！请填写以下信息。
  - type: textarea
    id: what-happened
    attributes:
      label: What happened? / 发生了什么？
      description: A clear description of the bug. / 清晰描述该缺陷。
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce / 复现步骤
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 期望行为
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform / 平台
      multiple: true
      options:
        - Android
        - iOS
        - Windows
        - Web
    validations:
      required: true
  - type: input
    id: flutter-version
    attributes:
      label: Flutter version / Flutter 版本
      description: Output of `flutter --version`. / `flutter --version` 的输出。
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / 日志
      description: Relevant logs or stack traces. / 相关日志或堆栈。
      render: shell
