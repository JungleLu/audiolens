name: Feature request / 功能建议
description: Suggest an idea for AudioLens / 为 AudioLens 提出想法
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / 要解决的问题
      description: What problem does this solve? / 这解决了什么问题？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution / 建议方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered / 考虑过的替代方案
  - type: textarea
    id: context
    attributes:
      label: Additional context / 补充说明
