name: audiolens
description: AudioLens — immersive English learning from any local video, with tap-to-analyze AI and a persisted notebook.
publish_to: "none"
version: 0.1.0+1
homepage: https://github.com/JungleLu/audiolens
repository: https://github.com/JungleLu/audiolens

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  file_picker: ^8.0.7
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5
  flutter_slidable: ^3.1.1
  dio: ^5.5.0+1
  shared_preferences: ^2.3.1
  collection: ^1.18.0
  gbk_codec: ^0.4.0
  audio_service: ^0.18.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.20.1

flutter:
  uses-material-design: true
